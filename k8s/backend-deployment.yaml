apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aiops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: myrepo/aiops-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: postgresql+asyncpg://aiops:aiops@postgres:5432/aiops
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq:5672//
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: aiops-secrets
              key: secret-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: aiops-secrets
              key: openai-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aiops
spec:
  selector:
    app: backend
  ports:
    - port: 8000