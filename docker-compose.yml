services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:aiops@postgres:5432/aiops
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      SECRET_KEY: ${SECRET_KEY}                           # from .env
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}                   # Fixed: now matches the new AI service
    ports:
      - "8000:8000"

  worker:
    build:
      context: .                                          # Use project root as build context
      dockerfile: worker/Dockerfile
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql+asyncpg://aiops:aiops@postgres:5432/aiops
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}                   # Fixed: now matches AI client
      PYTHONPATH: /app:/app/app                           # allow `import app.*` and `src.*`
    working_dir: /app

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  grafana_data: