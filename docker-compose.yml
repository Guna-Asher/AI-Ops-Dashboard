version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops_secret
      POSTGRES_DB: aiops_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_data:

