name: Deploy to AWS EC2

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push images
        run: |
          docker build -t myrepo/aiops-backend:${{ github.ref_name }} backend/
          docker build -t myrepo/aiops-worker:${{ github.ref_name }} worker/
          docker build -t myrepo/aiops-frontend:${{ github.ref_name }} frontend/
          docker push myrepo/aiops-backend:${{ github.ref_name }}
          docker push myrepo/aiops-worker:${{ github.ref_name }}
          docker push myrepo/aiops-frontend:${{ github.ref_name }}
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull myrepo/aiops-backend:${{ github.ref_name }}
            docker pull myrepo/aiops-worker:${{ github.ref_name }}
            docker pull myrepo/aiops-frontend:${{ github.ref_name }}
            cd /opt/aiops
            docker-compose down
            docker-compose up -d