name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aiops
          POSTGRES_PASSWORD: aiops
          POSTGRES_DB: test_aiops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 backend/app --count --max-line-length 127 --statistics
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://aiops:aiops@localhost:5432/test_aiops
          SECRET_KEY: test-key
        run: |
          cd backend
          python -m pytest --asyncio-mode=auto